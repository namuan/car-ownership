<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Ownership Tree</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a19;
    --text-secondary: #5f5e5a;
    --border: rgba(0,0,0,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a19;
      --text: #f1efe8;
      --text-secondary: #b4b2a9;
      --border: rgba(255,255,255,0.12);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    flex-shrink: 0;
    padding: 20px 28px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); }

  #chart-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  #chart-wrap:active { cursor: grabbing; }
  #chart-wrap.panning { cursor: grabbing; }

  #chart {
    width: 100%;
    height: 100%;
  }

  /* Links */
  .link {
    fill: none;
    stroke: #b4b2a9;
    stroke-width: 1.2;
    opacity: 0.6;
  }
  @media (prefers-color-scheme: dark) {
    .link { stroke: #5f5e5a; }
  }

  /* Node circles */
  .node circle {
    fill: var(--bg);
    cursor: pointer;
    transition: r 0.2s;
  }
  .node--root circle { stroke: #534AB7; stroke-width: 2.5; r: 12; }
  .node--level1 circle { stroke: #7F77DD; stroke-width: 2; r: 9; }
  .node--level2 circle { stroke: #D85A30; stroke-width: 1.5; r: 7; }
  .node--leaf circle { stroke: #1D9E75; stroke-width: 1.5; r: 5; }

  /* Logo images for leaf nodes */
  .node--leaf .logo-img {
    clip-path: circle(50%);
    cursor: pointer;
  }
  .node--leaf .logo-fallback {
    display: none;
  }

  /* Text */
  .node text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  /* Root text */
  .node--root text { font-weight: 700; font-size: 18px; fill: var(--text); }

  /* Level 1 - Parent companies */
  .node--level1 .label-bg { fill: #EEEDFE; }
  .node--level1 text { fill: #26215C; font-weight: 700; font-size: 16px; }
  @media (prefers-color-scheme: dark) {
    .node--level1 .label-bg { fill: #3C3489; }
    .node--level1 text { fill: #CECBF6; }
  }

  /* Level 2 - Subgroups */
  .node--level2 .label-bg { fill: #FAECE7; }
  .node--level2 text { fill: #4A1B0C; font-weight: 600; font-size: 13px; }
  @media (prefers-color-scheme: dark) {
    .node--level2 .label-bg { fill: #712B13; }
    .node--level2 text { fill: #F5C4B3; }
  }

  /* Level 3 - Brands */
  .node--leaf .label-bg { fill: #E1F5EE; }
  .node--leaf text { fill: #04342C; font-weight: 600; font-size: 11px; }
  @media (prefers-color-scheme: dark) {
    .node--leaf .label-bg { fill: #085041; }
    .node--leaf text { fill: #9FE1CB; }
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    padding: 6px 10px;
    font-size: 11px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 200px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 10;
  }
  @media (prefers-color-scheme: dark) {
    .tooltip { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  }

  .legend {
    flex-shrink: 0;
    padding: 12px 28px;
    display: flex; gap: 18px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-secondary);
    border-top: 0.5px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid; }

  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 5;
  }
  .zoom-btn {
    width: 32px; height: 32px;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .zoom-btn:hover { background: var(--color-background-secondary, #f5f5f4); }
  @media (prefers-color-scheme: dark) {
    .zoom-btn:hover { background: #2c2c2a; }
  }

  .level-controls {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 4px;
    padding: 4px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    z-index: 5;
  }
  .level-btn {
    height: 28px;
    padding: 0 9px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: var(--text);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  .level-btn:hover { background: var(--color-background-secondary, #f5f5f4); }
  @media (prefers-color-scheme: dark) {
    .level-btn:hover { background: #2c2c2a; }
  }
</style>
</head>
<body>

<header>
  <h1>Global Car Brand Ownership</h1>
  <p class="subtitle">Scroll to zoom &bull; Drag to pan &bull; Tap node or use level controls to collapse</p>
</header>

<div id="chart-wrap">
  <div id="chart"></div>
  <div class="level-controls" aria-label="Collapse levels">
    <button class="level-btn" id="expand-all" title="Expand all nodes">Expand all</button>
    <button class="level-btn" id="collapse-groups" title="Collapse all parent groups">Groups</button>
    <button class="level-btn" id="collapse-segments" title="Collapse all segment nodes">Segments</button>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
    <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
    <button class="zoom-btn" id="zoom-fit" title="Fit to screen">⛶</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="border-color:#7F77DD"></span> Parent Group</div>
  <div class="legend-item"><span class="legend-dot" style="border-color:#D85A30"></span> Segment</div>
  <div class="legend-item"><span class="legend-dot" style="border-color:#1D9E75"></span> Brand</div>
  <div class="legend-item" style="opacity:0.6">* Majority owned &nbsp; ** Joint venture</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const data = {
  name: "Global Automotive Groups",
  children: [
    {
      name: "Volkswagen Group (10)",
      children: [
        { name: "Volkswagen" }, { name: "Škoda" }, { name: "SEAT" },
        { name: "CUPRA" }, { name: "VW Commercial" },
        { name: "Audi" }, { name: "Porsche" }, { name: "Bentley" },
        { name: "Lamborghini" }, { name: "Ducati" }
      ]
    },
    {
      name: "Stellantis (14)",
      children: [
        { name: "Jeep" }, { name: "Ram" }, { name: "Peugeot" }, { name: "FIAT" },
        { name: "Chrysler" }, { name: "Dodge" }, { name: "Citroën" },
        { name: "Opel" }, { name: "Vauxhall" }, { name: "Alfa Romeo" },
        { name: "DS" }, { name: "Lancia" }, { name: "Abarth" }, { name: "Maserati" }
      ]
    },
    {
      name: "Toyota Motor Corp (6)",
      children: [
        { name: "Toyota" }, { name: "Lexus" }, { name: "Daihatsu" },
        { name: "Hino" }, { name: "Subaru*" }, { name: "Mazda*" }
      ]
    },
    {
      name: "Renault-Nissan-Mitsubishi (6)",
      children: [
        { name: "Renault Group", children: [
          { name: "Renault" }, { name: "Dacia" }, { name: "Alpine" }
        ]},
        { name: "Nissan Group", children: [
          { name: "Nissan" }, { name: "Infiniti" }
        ]},
        { name: "Alliance Partner", children: [{ name: "Mitsubishi" }] }
      ]
    },
    {
      name: "Hyundai Motor Group (3)",
      children: [
        { name: "Hyundai" }, { name: "Kia" }, { name: "Genesis" }
      ]
    },
    {
      name: "Mercedes-Benz Group (3)",
      children: [
        { name: "Mercedes-Benz" }, { name: "Mercedes-AMG" }, { name: "Mercedes-Maybach" }
      ]
    },
    {
      name: "Honda Motor Co. (2)",
      children: [
        { name: "Honda" }, { name: "Acura" }
      ]
    },
    {
      name: "Suzuki Motor Corp. (2)",
      children: [
        { name: "Suzuki" }, { name: "Maruti Suzuki*" }
      ]
    },
    {
      name: "Geely Holding Group (7)",
      children: [
        { name: "Geely Auto" }, { name: "Zeekr" }, { name: "Lynk & Co" },
        { name: "Volvo Cars*" }, { name: "Polestar*" }, { name: "Lotus*" },
        { name: "Smart**" }
      ]
    },
    {
      name: "SAIC Motor (6)",
      children: [
        { name: "MG" }, { name: "Roewe" }, { name: "IM Motors" },
        { name: "Maxus/LDV" }, { name: "Wuling**" }, { name: "Baojun**" }
      ]
    },
    {
      name: "Chery Holding Group (7)",
      children: [
        { name: "Chery" }, { name: "Exeed" }, { name: "Jetour" },
        { name: "iCAR" }, { name: "Omoda" }, { name: "Jaecoo" },
        { name: "Luxeed**" }
      ]
    },
    {
      name: "Great Wall Motor (5)",
      children: [
        { name: "Haval" }, { name: "Wey" }, { name: "Tank" },
        { name: "Ora" }, { name: "Poer" }
      ]
    },
    {
      name: "Changan Automobile (3)",
      children: [
        { name: "Changan" }, { name: "Deepal" }, { name: "Avatr**" }
      ]
    },
    {
      name: "FAW Group (3)",
      children: [
        { name: "Hongqi" }, { name: "Bestune" }, { name: "Jiefang" }
      ]
    },
    {
      name: "Dongfeng Motor (3)",
      children: [
        { name: "Dongfeng" }, { name: "Voyah" }, { name: "M-Hero" }
      ]
    },
    {
      name: "BAIC Group (3)",
      children: [
        { name: "BAIC" }, { name: "Beijing" }, { name: "Arcfox" }
      ]
    },
    {
      name: "General Motors (3)",
      children: [
        { name: "Chevrolet" }, { name: "GMC" }, { name: "Cadillac" }
      ]
    },
    {
      name: "Ford Motor Company (2)",
      children: [
        { name: "Ford" }, { name: "Lincoln" }
      ]
    },
    {
      name: "Tata Motors (2)",
      children: [
        { name: "Jaguar" }, { name: "Land Rover" }
      ]
    },
    {
      name: "Mahindra Group (2)",
      children: [
        { name: "Mahindra" }, { name: "Pininfarina" }
      ]
    },
    {
      name: "BMW Group (3)",
      children: [
        { name: "BMW" }, { name: "MINI" }, { name: "Rolls-Royce" }
      ]
    },
    {
      name: "Independent (9)",
      children: [
        { name: "Tesla" }, { name: "BYD" }, { name: "Ferrari" },
        { name: "Aston Martin" }, { name: "McLaren" }, { name: "Lucid" },
        { name: "Rivian" }, { name: "VinFast" }, { name: "Isuzu" }
      ]
    }
  ]
};

const groupFlags = {
  "Volkswagen Group": "🇩🇪",
  "Stellantis": "🇳🇱",
  "Toyota Motor Corp": "🇯🇵",
  "Renault-Nissan-Mitsubishi": "🇫🇷🇯🇵",
  "Hyundai Motor Group": "🇰🇷",
  "Mercedes-Benz Group": "🇩🇪",
  "Honda Motor Co.": "🇯🇵",
  "Suzuki Motor Corp.": "🇯🇵",
  "Geely Holding Group": "🇨🇳",
  "SAIC Motor": "🇨🇳",
  "Chery Holding Group": "🇨🇳",
  "Great Wall Motor": "🇨🇳",
  "Changan Automobile": "🇨🇳",
  "FAW Group": "🇨🇳",
  "Dongfeng Motor": "🇨🇳",
  "BAIC Group": "🇨🇳",
  "General Motors": "🇺🇸",
  "Ford Motor Company": "🇺🇸",
  "Tata Motors": "🇮🇳",
  "Mahindra Group": "🇮🇳",
  "BMW Group": "🇩🇪"
};

function cleanNodeName(name) {
  return name.replace(/\(\d+\)/g, "").trim();
}

function displayName(d) {
  const name = cleanNodeName(d.data.name);
  if (d.depth !== 1) return d.data.name;

  const flag = groupFlags[name];
  return flag ? `${flag} ${d.data.name}` : d.data.name;
}

// ── Dimensions ──
const diameter = 2600;
const radius = diameter / 2;
const margin = 60;

// ── Hierarchy ──
const root = d3.hierarchy(data);
const treeLayout = d3.tree()
  .size([2 * Math.PI, radius - margin])
  .separation((a, b) => (a.parent === b.parent ? 1.5 : 2.2) / a.depth);

// ── SVG ──
const chartDiv = d3.select("#chart");
const svg = chartDiv.append("svg")
  .attr("width", "100%")
  .attr("height", "100%")
  .attr("viewBox", [-diameter/2, -diameter/2, diameter, diameter])
  .attr("preserveAspectRatio", "xMidYMid meet")
  .style("display", "block");

const gRoot = svg.append("g");
const gLink = gRoot.append("g");
const gNode = gRoot.append("g");

const tooltip = d3.select("body").append("div").attr("class", "tooltip");

// Radial projection
function radialPoint(x, y) {
  return [(y = +y) * Math.cos(x -= Math.PI / 2), y * Math.sin(x)];
}

const radialLink = d3.linkRadial()
  .angle(d => d.x)
  .radius(d => d.y);

// ── Zoom ──
const zoomBehavior = d3.zoom()
  .scaleExtent([0.15, 4])
  .on("zoom", (event) => {
    gRoot.attr("transform", event.transform);
    if (event.sourceEvent && event.sourceEvent.type === "mousemove") {
      d3.select("#chart-wrap").classed("panning", true);
    }
  })
  .on("end", () => {
    d3.select("#chart-wrap").classed("panning", false);
  });

svg.call(zoomBehavior);

// Start at identity — the viewBox handles the initial fit
svg.call(zoomBehavior.transform, d3.zoomIdentity);

function expandNode(d) {
  if (d._children) {
    d.children = d._children;
    d._children = null;
  }
  if (d.children) d.children.forEach(expandNode);
}

function collapseNode(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  }
}

function expandAll() {
  expandNode(root);
  update();
}

function collapseAtDepth(depth) {
  expandNode(root);
  root.descendants()
    .filter(d => d.depth === depth && d.children)
    .forEach(collapseNode);
  update();
}

function collapseSegments() {
  expandNode(root);
  root.descendants()
    .filter(d => d.depth >= 2 && d.children)
    .forEach(collapseNode);
  update();
}

// ── Render ──
function update() {
  treeLayout(root);
  const nodes = root.descendants();
  const links = root.links();

  // Links
  gLink.selectAll("path")
    .data(links, d => d.target.data.name)
    .join("path")
    .attr("class", "link")
    .attr("d", radialLink);

  // Nodes
  const node = gNode.selectAll("g")
    .data(nodes, d => d.data.name)
    .join("g")
    .attr("class", d => {
      if (d.depth === 0) return "node node--root";
      if (d.depth === 1) return "node node--level1";
      if (d.depth >= 2 && (d.children || d._children)) return "node node--level2";
      return "node node--leaf";
    })
    .attr("transform", d => {
      const [x, y] = radialPoint(d.x, d.y);
      return `translate(${x},${y})`;
    })
    .on("click", (event, d) => {
      event.stopPropagation();
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else {
        d.children = d._children;
        d._children = null;
      }
      update();
    })
    .on("mouseenter", (event, d) => {
      let extra = "";
      if (d.data.name.includes("**")) extra = " — joint venture";
      else if (d.data.name.includes("*")) extra = " — majority owned (not fully)";
      tooltip.style("opacity", 1).html(d.data.name.replace(/\*+/g, "").replace(/\(\d+\)/, "").trim() + extra);
    })
    .on("mousemove", (event) => {
      tooltip.style("left", (event.clientX + 14) + "px").style("top", (event.clientY - 10) + "px");
    })
    .on("mouseleave", () => tooltip.style("opacity", 0));

  // Circle / Logo image
  node.selectAll("circle").remove();
  node.selectAll("image").remove();

  node.each(function(d) {
    const el = d3.select(this);
    const isLeaf = !(d.children || d._children) && d.depth >= 2;

    if (isLeaf) {
      // Try to show logo for leaf brand nodes
      const cleanName = d.data.name.replace(/\*+/g, "").trim();
      const fileBase = cleanName.replace(/ /g, "_");
      const exts = ["png", "jpg", "jpeg", "svg"];

      // Add logo image (browser will show broken-image fallback if 404)
      const imgSize = 24;
      el.append("image")
        .attr("class", "logo-img")
        .attr("x", -imgSize / 2)
        .attr("y", -imgSize / 2)
        .attr("width", imgSize)
        .attr("height", imgSize)
        .attr("href", `car-logos/${fileBase}.png`)
        .attr("preserveAspectRatio", "xMidYMid slice")
        .on("error", function() {
          // Try next extension
          const img = d3.select(this);
          const current = img.attr("href");
          const extIdx = exts.findIndex(e => current.endsWith(`.${e}`));
          if (extIdx >= 0 && extIdx < exts.length - 1) {
            img.attr("href", `car-logos/${fileBase}.${exts[extIdx + 1]}`);
          } else {
            // All failed — hide image and show circle
            img.style("display", "none");
            el.append("circle")
              .attr("r", 5)
              .attr("class", "logo-fallback")
              .style("display", "block");
          }
        });
    } else {
      el.append("circle");
    }
  });

  // Label background + text
  node.selectAll(".label").remove();
  node.selectAll("rect").remove();
  node.selectAll("text").remove();

  node.each(function(d) {
    if (d.depth === 0) {
      d3.select(this).append("text")
        .text(d.data.name)
        .attr("y", 0)
        .attr("dominant-baseline", "central")
        .attr("text-anchor", "middle");
      return;
    }

    const isLeaf = !(d.children || d._children) && d.depth >= 2;
    const txt = displayName(d);
    const padX = 10;
    const angle = d.x;
    const isRight = Math.cos(angle - Math.PI / 2) >= 0;
    const anchor = isRight ? "start" : "end";
    const nodeRadius = isLeaf ? 12 : d.depth === 1 ? 9 : 7;
    const gap = 6;
    const labelX = (nodeRadius + gap) * (isRight ? 1 : -1);
    const textX = isRight ? padX : -padX;

    const label = d3.select(this).append("g")
      .attr("class", "label")
      .attr("transform", `translate(${labelX},0)`);

    const text = label.append("text")
      .text(txt)
      .attr("x", textX)
      .attr("y", 0)
      .attr("dominant-baseline", "central")
      .attr("text-anchor", anchor);

    const bbox = text.node().getBBox();
    const rectX = isRight ? 0 : bbox.x - padX;

    label.insert("rect", "text")
      .attr("class", "label-bg")
      .attr("x", rectX)
      .attr("y", -13)
      .attr("width", bbox.width + padX * 2)
      .attr("height", 26);
  });
}

// All nodes expanded
update();

// Zoom button handlers
function zoomIn() {
  svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.4);
}
function zoomOut() {
  svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.7);
}
function zoomReset() {
  svg.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity);
}

d3.select("#zoom-in").on("click", zoomIn);
d3.select("#zoom-out").on("click", zoomOut);
d3.select("#zoom-fit").on("click", zoomReset);
d3.select("#expand-all").on("click", expandAll);
d3.select("#collapse-groups").on("click", () => collapseAtDepth(1));
d3.select("#collapse-segments").on("click", collapseSegments);
</script>

</body>
</html>
