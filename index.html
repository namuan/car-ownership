<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Ownership Atlas</title>
<style>
  :root {
    --bg: #f7f3ea;
    --text: #1f1b16;
    --text-secondary: #6f6558;
    --border: rgba(0,0,0,0.12);
    --link: rgba(31,27,22,0.2);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171411;
      --text: #f5efe3;
      --text-secondary: #beb2a1;
      --border: rgba(255,255,255,0.12);
      --link: rgba(245,239,227,0.2);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    flex-shrink: 0;
    padding: 22px 28px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  h1 { font-size: 22px; font-weight: 720; margin-bottom: 2px; letter-spacing: 0; }
  .subtitle { font-size: 13px; color: var(--text-secondary); }

  #chart-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    padding: 18px;
  }

  #chart {
    width: 100%;
    height: 100%;
    min-height: 520px;
  }

  .link {
    fill: none;
    stroke: var(--link);
    stroke-width: 1.1;
  }
  .link--active {
    stroke-width: 2.2;
    opacity: 0.9;
  }
  .node circle {
    fill: var(--bg);
    stroke-width: 1.7;
  }
  .node--root circle {
    fill: var(--text);
    stroke: var(--text);
  }
  .node--group circle {
    stroke-width: 2.4;
  }
  .node--segment circle {
    stroke-width: 1.8;
  }
  .node--brand circle {
    fill: var(--bg);
  }
  .node text {
    fill: var(--text);
    font-size: 11px;
    font-weight: 650;
    pointer-events: none;
  }
  .node--root text {
    font-size: 16px;
    font-weight: 760;
    text-anchor: middle;
  }
  .node--group text {
    font-size: 13px;
    font-weight: 760;
  }
  .node--segment text {
    fill: var(--text-secondary);
    font-size: 11px;
  }
  .node--dim { opacity: 0.22; }

  /* Tooltip */
  .tooltip {
    position: fixed;
    padding: 6px 10px;
    font-size: 11px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 200px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 10;
  }
  @media (prefers-color-scheme: dark) {
    .tooltip { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  }

  .legend {
    flex-shrink: 0;
    padding: 12px 28px;
    display: flex; gap: 18px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-secondary);
    border-top: 0.5px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid; }

  @media (max-width: 760px) {
    header { padding: 18px 18px 12px; }
    #chart-wrap { padding: 10px; }
    #chart { min-height: 680px; }
    .legend { padding: 10px 18px; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>Global Car Brand Ownership</h1>
  <p class="subtitle">Circular ownership tree. Hover a brand or group to trace its parent path.</p>
</header>

<div id="chart-wrap">
  <div id="chart"></div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="border-color:#2f6f73"></span> Parent Group</div>
  <div class="legend-item"><span class="legend-dot" style="border-color:#bd9d37"></span> Segment</div>
  <div class="legend-item"><span class="legend-dot" style="border-color:#d98841"></span> Brand</div>
  <div class="legend-item" style="opacity:0.6">* Majority owned &nbsp; ** Joint venture</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const data = {
  name: "Global Automotive Groups",
  children: [
    {
      name: "Volkswagen Group (10)",
      children: [
        { name: "Volkswagen" }, { name: "Škoda" }, { name: "SEAT" },
        { name: "CUPRA" }, { name: "VW Commercial" },
        { name: "Audi" }, { name: "Porsche" }, { name: "Bentley" },
        { name: "Lamborghini" }, { name: "Ducati" }
      ]
    },
    {
      name: "Stellantis (14)",
      children: [
        { name: "Jeep" }, { name: "Ram" }, { name: "Peugeot" }, { name: "FIAT" },
        { name: "Chrysler" }, { name: "Dodge" }, { name: "Citroën" },
        { name: "Opel" }, { name: "Vauxhall" }, { name: "Alfa Romeo" },
        { name: "DS" }, { name: "Lancia" }, { name: "Abarth" }, { name: "Maserati" }
      ]
    },
    {
      name: "Toyota Motor Corp (6)",
      children: [
        { name: "Toyota" }, { name: "Lexus" }, { name: "Daihatsu" },
        { name: "Hino" }, { name: "Subaru*" }, { name: "Mazda*" }
      ]
    },
    {
      name: "Renault-Nissan-Mitsubishi (6)",
      children: [
        { name: "Renault Group", children: [
          { name: "Renault" }, { name: "Dacia" }, { name: "Alpine" }
        ]},
        { name: "Nissan Group", children: [
          { name: "Nissan" }, { name: "Infiniti" }
        ]},
        { name: "Alliance Partner", children: [{ name: "Mitsubishi" }] }
      ]
    },
    {
      name: "Hyundai Motor Group (3)",
      children: [
        { name: "Hyundai" }, { name: "Kia" }, { name: "Genesis" }
      ]
    },
    {
      name: "Mercedes-Benz Group (3)",
      children: [
        { name: "Mercedes-Benz" }, { name: "Mercedes-AMG" }, { name: "Mercedes-Maybach" }
      ]
    },
    {
      name: "Honda Motor Co. (2)",
      children: [
        { name: "Honda" }, { name: "Acura" }
      ]
    },
    {
      name: "Suzuki Motor Corp. (2)",
      children: [
        { name: "Suzuki" }, { name: "Maruti Suzuki*" }
      ]
    },
    {
      name: "Geely Holding Group (7)",
      children: [
        { name: "Geely Auto" }, { name: "Zeekr" }, { name: "Lynk & Co" },
        { name: "Volvo Cars*" }, { name: "Polestar*" }, { name: "Lotus*" },
        { name: "Smart**" }
      ]
    },
    {
      name: "SAIC Motor (6)",
      children: [
        { name: "MG" }, { name: "Roewe" }, { name: "IM Motors" },
        { name: "Maxus/LDV" }, { name: "Wuling**" }, { name: "Baojun**" }
      ]
    },
    {
      name: "Chery Holding Group (7)",
      children: [
        { name: "Chery" }, { name: "Exeed" }, { name: "Jetour" },
        { name: "iCAR" }, { name: "Omoda" }, { name: "Jaecoo" },
        { name: "Luxeed**" }
      ]
    },
    {
      name: "Great Wall Motor (5)",
      children: [
        { name: "Haval" }, { name: "Wey" }, { name: "Tank" },
        { name: "Ora" }, { name: "Poer" }
      ]
    },
    {
      name: "Changan Automobile (3)",
      children: [
        { name: "Changan" }, { name: "Deepal" }, { name: "Avatr**" }
      ]
    },
    {
      name: "FAW Group (3)",
      children: [
        { name: "Hongqi" }, { name: "Bestune" }, { name: "Jiefang" }
      ]
    },
    {
      name: "Dongfeng Motor (3)",
      children: [
        { name: "Dongfeng" }, { name: "Voyah" }, { name: "M-Hero" }
      ]
    },
    {
      name: "BAIC Group (3)",
      children: [
        { name: "BAIC" }, { name: "Beijing" }, { name: "Arcfox" }
      ]
    },
    {
      name: "General Motors (3)",
      children: [
        { name: "Chevrolet" }, { name: "GMC" }, { name: "Cadillac" }
      ]
    },
    {
      name: "Ford Motor Company (2)",
      children: [
        { name: "Ford" }, { name: "Lincoln" }
      ]
    },
    {
      name: "Tata Motors (2)",
      children: [
        { name: "Jaguar" }, { name: "Land Rover" }
      ]
    },
    {
      name: "Mahindra Group (2)",
      children: [
        { name: "Mahindra" }, { name: "Pininfarina" }
      ]
    },
    {
      name: "Independent (12)",
      children: [
        { name: "Fully Independent", children: [
          { name: "Tesla" }, { name: "BYD" }, { name: "Ferrari" },
          { name: "Aston Martin" }, { name: "McLaren" }, { name: "Lucid" },
          { name: "Rivian" }, { name: "VinFast" }, { name: "Isuzu" }
        ]},
        { name: "BMW Group", children: [
          { name: "BMW" }, { name: "MINI" }, { name: "Rolls-Royce" }
        ]}
      ]
    }
  ]
};

const chartDiv = d3.select("#chart");
const svg = chartDiv.append("svg")
  .attr("width", "100%")
  .attr("height", "100%")
  .style("display", "block");

const tooltip = d3.select("body").append("div").attr("class", "tooltip");
const palette = [
  "#d98841", "#2f6f73", "#b94d3f", "#6f7f39", "#a65f8f",
  "#3d6ca8", "#bd9d37", "#4f7f63", "#8f5b38", "#6b5f95"
];

const color = d3.scaleOrdinal()
  .domain(data.children.map(d => d.name))
  .range(palette);

function cleanLabel(name) {
  return name.replace(/\(\d+\)/g, "").trim();
}

function ownershipDetail(name) {
  if (name.includes("**")) return "Joint venture";
  if (name.includes("*")) return "Majority owned";
  return "Owned brand";
}

function branchColor(d) {
  const group = d.ancestors().find(item => item.depth === 1);
  return group ? color(group.data.name) : "#1f1b16";
}

function polarPoint(angle, radius) {
  return [
    radius * Math.cos(angle - Math.PI / 2),
    radius * Math.sin(angle - Math.PI / 2)
  ];
}

function renderCircularTree() {
  const bounds = chartDiv.node().getBoundingClientRect();
  const width = Math.max(720, bounds.width || 720);
  const height = Math.max(520, bounds.height || 520);
  const diameter = Math.min(width, height) - 36;
  const radius = diameter / 2;

  svg
    .attr("viewBox", [-width / 2, -height / 2, width, height])
    .attr("preserveAspectRatio", "xMidYMid meet");

  svg.selectAll("*").remove();

  const root = d3.hierarchy(data)
    .sort((a, b) => d3.ascending(cleanLabel(a.data.name), cleanLabel(b.data.name)));

  d3.cluster()
    .size([2 * Math.PI, radius - 124])
    .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.4) / Math.max(1, a.depth))(root);

  const radialLine = d3.lineRadial()
    .curve(d3.curveBundle.beta(0.78))
    .angle(d => d.x)
    .radius(d => d.y);

  const links = svg.append("g")
    .selectAll("path")
    .data(root.links())
    .join("path")
    .attr("class", "link")
    .attr("stroke", d => branchColor(d.target))
    .attr("stroke-opacity", d => d.target.depth === 1 ? 0.45 : 0.28)
    .attr("d", d => radialLine(d.target.path(d.source)));

  const nodes = svg.append("g")
    .selectAll("g")
    .data(root.descendants())
    .join("g")
    .attr("class", d => {
      if (d.depth === 0) return "node node--root";
      if (d.depth === 1) return "node node--group";
      if (d.children) return "node node--segment";
      return "node node--brand";
    })
    .attr("transform", d => {
      const [x, y] = polarPoint(d.x, d.y);
      return `translate(${x},${y})`;
    })
    .on("mouseenter", (event, d) => {
      const active = new Set([...d.ancestors(), ...d.descendants()]);
      const lineage = d.ancestors().reverse().slice(1).map(item => cleanLabel(item.data.name)).join(" / ");

      nodes.classed("node--dim", node => !active.has(node));
      links
        .classed("link--active", link => active.has(link.source) && active.has(link.target))
        .attr("stroke-opacity", link => active.has(link.source) && active.has(link.target) ? 0.9 : 0.12);

      tooltip
        .style("opacity", 1)
        .html(`${d.data.name.replace(/\*+/g, "")}<br>${lineage || "Root"}<br>${ownershipDetail(d.data.name)}`);
    })
    .on("mousemove", (event) => {
      tooltip.style("left", (event.clientX + 14) + "px").style("top", (event.clientY - 10) + "px");
    })
    .on("mouseleave", () => {
      nodes.classed("node--dim", false);
      links.classed("link--active", false).attr("stroke-opacity", d => d.target.depth === 1 ? 0.45 : 0.28);
      tooltip.style("opacity", 0);
    });

  nodes.append("circle")
    .attr("r", d => d.depth === 0 ? 8 : d.depth === 1 ? 5.5 : d.children ? 4.2 : 3.2)
    .attr("stroke", d => branchColor(d));

  nodes.append("text")
    .attr("dy", "0.32em")
    .attr("x", d => d.depth === 0 ? 0 : d.x < Math.PI ? 9 : -9)
    .attr("text-anchor", d => d.depth === 0 ? "middle" : d.x < Math.PI ? "start" : "end")
    .attr("transform", d => {
      if (d.depth === 0) return null;
      const degrees = d.x * 180 / Math.PI - 90;
      return `rotate(${d.x >= Math.PI ? degrees + 180 : degrees})`;
    })
    .text(d => d.depth === 0 ? "Automotive Groups" : cleanLabel(d.data.name));
}

renderCircularTree();
new ResizeObserver(renderCircularTree).observe(chartDiv.node());
</script>

</body>
</html>
